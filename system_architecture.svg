<svg width="100%" viewBox="0 0 680 520" role="img" xmlns="http://www.w3.org/2000/svg">
<title>PID Line Follower Robot System Architecture</title>
<desc>Block diagram showing the system architecture of the Bluetooth-enabled PID line follower robot</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- Outer system boundary -->
<rect x="30" y="20" width="620" height="480" rx="16" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="6 4"/>
<text font-size="12" fill="#888" x="50" y="42">Robot system</text>

<!-- 8-sensor IR array -->
<rect x="60" y="70" width="160" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#085041" x="140" y="94" text-anchor="middle" dominant-baseline="central">8-sensor IR array</text>
<text font-size="12" fill="#0F6E56" x="140" y="112" text-anchor="middle" dominant-baseline="central">reads line position</text>

<!-- Arduino -->
<rect x="260" y="190" width="160" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#26215C" x="340" y="214" text-anchor="middle" dominant-baseline="central">Arduino Uno</text>
<text font-size="12" fill="#534AB7" x="340" y="232" text-anchor="middle" dominant-baseline="central">PD control loop</text>

<!-- Motor driver -->
<rect x="260" y="340" width="160" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#4A1B0C" x="340" y="364" text-anchor="middle" dominant-baseline="central">L298N motor driver</text>
<text font-size="12" fill="#993C1D" x="340" y="382" text-anchor="middle" dominant-baseline="central">PWM speed control</text>

<!-- Left motor -->
<rect x="60" y="340" width="140" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#2C2C2A" x="130" y="364" text-anchor="middle" dominant-baseline="central">Left motor</text>
<text font-size="12" fill="#5F5E5A" x="130" y="382" text-anchor="middle" dominant-baseline="central">2000 RPM DC</text>

<!-- Right motor -->
<rect x="480" y="340" width="140" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#2C2C2A" x="550" y="364" text-anchor="middle" dominant-baseline="central">Right motor</text>
<text font-size="12" fill="#5F5E5A" x="550" y="382" text-anchor="middle" dominant-baseline="central">2000 RPM DC</text>

<!-- OLED -->
<rect x="480" y="190" width="140" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#042C53" x="550" y="214" text-anchor="middle" dominant-baseline="central">I2C OLED</text>
<text font-size="12" fill="#185FA5" x="550" y="232" text-anchor="middle" dominant-baseline="central">live diagnostics</text>

<!-- Bluetooth -->
<rect x="480" y="70" width="140" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#042C53" x="550" y="94" text-anchor="middle" dominant-baseline="central">HC-05 Bluetooth</text>
<text font-size="12" fill="#185FA5" x="550" y="112" text-anchor="middle" dominant-baseline="central">wireless telemetry</text>

<!-- Phone -->
<rect x="480" y="450" width="140" height="40" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#2C2C2A" x="550" y="474" text-anchor="middle" dominant-baseline="central">Phone / PC</text>

<!-- Arrows -->
<line x1="220" y1="98" x2="258" y2="200" stroke="#888" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<text font-size="12" fill="#888" x="218" y="160" text-anchor="middle">error signal</text>

<line x1="340" y1="246" x2="340" y2="338" stroke="#888" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<text font-size="12" fill="#888" x="358" y="298" text-anchor="start">PWM</text>

<line x1="260" y1="368" x2="202" y2="368" stroke="#888" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<line x1="420" y1="368" x2="478" y2="368" stroke="#888" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<line x1="420" y1="210" x2="478" y2="210" stroke="#888" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<text font-size="12" fill="#888" x="450" y="204" text-anchor="middle">I2C</text>

<line x1="420" y1="218" x2="478" y2="112" stroke="#888" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<line x1="550" y1="126" x2="550" y2="448" stroke="#888" stroke-width="1.5" fill="none" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<text font-size="12" fill="#888" x="568" y="300" text-anchor="start">wireless</text>

<!-- PCB label -->
<rect x="40" y="430" width="130" height="36" rx="6" fill="none" stroke="#aaa" stroke-width="0.5" stroke-dasharray="4 3"/>
<text font-size="12" fill="#888" x="105" y="452" text-anchor="middle" dominant-baseline="central">Custom PCB (Altium)</text>
</svg>
